# opnsense_config.ini — ad.lab firewall configuration
# Generate config.xml with: oscg -f xml
# Generate config.iso with: oscg -f iso
# Generate both with:       oscg -f both
#
# Network layout:
#   WAN   vtnet0  10.0.0.2/30     gateway: 10.0.0.1 (hypervisor NAT)
#   LAN   vtnet1  10.0.1.1/24     domain members, DCs, CA, services
#   OPT1  vtnet2  10.0.2.1/24     DMZ — vpn01, web01, waf01
#   OPT2  vtnet3  10.0.3.1/24     MGMT — jump01, hypervisor console

# ── System ────────────────────────────────────────────────────
[Host]
hostname = fw01
domain   = ad.lab
# Primary DNS = ad01, Secondary DNS = ad02
# During bootstrap before DCs exist, use public DNS temporarily
dns      = 10.0.1.10, 10.0.1.11

# ── WAN — lab-wan 10.0.0.0/30 ────────────────────────────────
# Point-to-point link between fw01 and hypervisor NAT bridge
[WAN]
if      = vtnet0
ip      = 10.0.0.2
subnet  = 30
gateway = 10.0.0.1

# ── LAN — lab-lan 10.0.1.0/24 ────────────────────────────────
# All domain members live here.
# DHCP scope: .50-.200 (static assignments below .50)
# Static reservations:
#   10.0.1.1   fw01 (this firewall)
#   10.0.1.10  ad01 — primary DC, DNS1
#   10.0.1.11  ad02 — replica DC
#   10.0.1.20  ca01 — offline root CA (NIC unconfigured)
#   10.0.1.21  ca02 — issuing CA
#   10.0.1.30  dhcp01
#   10.0.1.31  fs01
#   10.0.1.40  app01
#   10.0.1.41  jump01
[LAN]
if          = vtnet1
ip          = 10.0.1.1
subnet      = 24
description = LAN
dhcp_start  = 10.0.1.50
dhcp_end    = 10.0.1.200

# ── OPT1 — lab-dmz 10.0.2.0/24 ───────────────────────────────
# DMZ — public-facing VMs, no DHCP (all static)
# Static reservations:
#   10.0.2.1   fw01 DMZ leg
#   10.0.2.10  vpn01 — RRAS / IKEv2
#   10.0.2.11  web01 — IIS
#   10.0.2.12  waf01 — reverse proxy
[OPT1]
if          = vtnet2
ip          = 10.0.2.1
subnet      = 24
description = DMZ

# ── OPT2 — lab-mgmt 10.0.3.0/24 ──────────────────────────────
# Out-of-band management — isolated, no DHCP
# Static reservations:
#   10.0.3.1   fw01 MGMT leg
#   10.0.3.10  jump01 mgmt NIC
#   10.0.3.254 hypervisor (virbr-mgmt)
[OPT2]
if          = vtnet3
ip          = 10.0.3.1
subnet      = 24
description = MGMT

# ── API Bootstrap (optional — remove if not needed) ───────────
# Allows immediate API access after install for automation.
# Generate a real key/secret pair with:
#   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
# Replace the placeholders below before use.
# [API]
# key    = REPLACE_WITH_REAL_KEY
# secret = REPLACE_WITH_REAL_SECRET_HASH
